name: Lint

on:
  push:
    branches: [main]
    paths:
      - "index.js"
      - "eslint.config.mjs"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "index.js"
      - "eslint.config.mjs"
      - ".github/workflows/lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check
        run: node --check index.js

      - name: ESLint
        run: npx --yes eslint@9 index.js
